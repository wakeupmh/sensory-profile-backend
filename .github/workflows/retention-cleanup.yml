name: Retention cleanup

on:
  schedule:
    # Weekly, Sunday 06:00 UTC — this is housekeeping, not time-sensitive
    # like the daily reminder digest.
    - cron: '0 6 * * 0'
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger retention cleanup
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::BACKEND_URL secret is not set"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set"
            exit 1
          fi

          status=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "$BACKEND_URL/api/system/retention-cleanup" \
            -H "X-Cron-Secret: $CRON_SECRET")

          echo "Response:"
          cat /tmp/response.json
          echo ""

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Retention cleanup failed with status $status"
            exit 1
          fi
