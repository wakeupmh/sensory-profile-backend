name: Reminder digest

on:
  schedule:
    # 12:00 UTC ≈ 09:00 America/Sao_Paulo (UTC-3) — manhã no Brasil
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  trigger-digest:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/system/reminder-digest
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BACKEND_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Configure os secrets BACKEND_URL e CRON_SECRET nas settings do repositório (Settings > Secrets and variables > Actions) antes de habilitar este workflow."
            exit 1
          fi

          response=$(curl -sS -w '\n%{http_code}' --max-time 60 \
            -X POST "${BACKEND_URL%/}/api/system/reminder-digest" \
            -H "X-Cron-Secret: ${CRON_SECRET}")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "$body"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::reminder-digest respondeu HTTP $http_code"
            exit 1
          fi
